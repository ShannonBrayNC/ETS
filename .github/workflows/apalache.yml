name: Apalache Symbolic Verification

on:
  workflow_dispatch:
  pull_request:

jobs:
  symbolic-verification:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download Apalache
        run: |
          mkdir -p tools
          cd tools
          curl -L -o apalache.tgz https://github.com/informalsystems/apalache/releases/download/v0.40.7/apalache.tgz
          tar -xzf apalache.tgz

      - name: Validate symbolic target manifest
        run: |
          test -f formal/apalache/model-targets.json
          jq empty formal/apalache/model-targets.json

      - name: Execute symbolic-safe ETSLog model
        run: |
          mkdir -p artifacts/proofs/etslog
          tools/apalache/bin/apalache-mc check \
            --init=Init \
            --next=Next \
            --inv=TypeOK \
            formal/apalache/models/ETSLogSymbolic.tla \
            > artifacts/proofs/etslog/output.txt

      - name: Execute symbolic-safe federation model
        run: |
          mkdir -p artifacts/proofs/federation
          tools/apalache/bin/apalache-mc check \
            --init=Init \
            --next=Next \
            --inv=AcceptedRequiresQuorum \
            formal/apalache/models/ETSVerifierFederationSymbolic.tla \
            > artifacts/proofs/federation/output.txt

      - name: Execute symbolic-safe transport model
        run: |
          mkdir -p artifacts/proofs/transport
          tools/apalache/bin/apalache-mc check \
            --init=Init \
            --next=Next \
            --inv=ReplayRequiresDelivery \
            formal/apalache/models/ETSAsyncTransportSymbolic.tla \
            > artifacts/proofs/transport/output.txt

      - name: Generate symbolic verification summary
        run: |
          mkdir -p artifacts/proofs
          echo "ETS symbolic-safe verification summary" > artifacts/proofs/summary.txt
          echo "Executed symbolic-safe bounded models under Apalache." >> artifacts/proofs/summary.txt
          echo "These models preserve core safety semantics while intentionally reducing unsupported symbolic complexity." >> artifacts/proofs/summary.txt
          echo "This workflow does not constitute universal theorem proof or complete symbolic coverage." >> artifacts/proofs/summary.txt

      - name: Upload symbolic proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: symbolic-proof-artifacts
          path: artifacts/proofs/
