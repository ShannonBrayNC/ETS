name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repo structure check
        run: |
          test -d ets/core
          test -d ets/api
          test -d ets/verifier
          test -d ets/spec
