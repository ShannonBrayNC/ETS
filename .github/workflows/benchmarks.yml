name: Benchmarks

on:
  workflow_dispatch:
  pull_request:

jobs:
  benchmarks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install -e ".[dev]"

      - name: Execute benchmark suite
        run: python -m ets.benchmarks.run_benchmarks

      - name: Execute reproducible replay experiments
        run: python -m ets.experiments.replay_runner

      - name: Validate reproducibility documentation
        run: |
          test -f docs/dissertation/REPRODUCIBILITY.md
          test -f experiments/scenarios/sprint11-replay-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: artifacts/benchmarks/

      - uses: actions/upload-artifact@v4
        with:
          name: experiment-results
          path: artifacts/experiments/
